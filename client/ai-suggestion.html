<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StackLayer – Creation</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/components/pages/landing.css" />
    <link rel="stylesheet" href="css/components/navbar.css" />
    <link rel="stylesheet" href="css/components/pages/ai-suggestion.css" />
  </head>
  <body>
    <nav class="nav-container">
      <div class="container nav">
        <a class="nav-logo" data-link="/index" href="#">
          <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M4 6h16M4 12h16M4 18h10"
                stroke="#fff"
                stroke-width="2.5"
                stroke-linecap="round"
                fill="none"
              />
            </svg>
          </div>
          StackLayer
        </a>
        <ul class="nav-links">
          <li data-link="/project-phase">Tools</li>
          <li data-link="/discover">Discover</li>
          <li>Community</li>
        </ul>
        <div class="nav-right">
          <div class="search-bar">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="M21 21l-4.35-4.35" />
            </svg>
            Search AI tools...
          </div>
          <button class="btn-primary" data-link="/work-selection">
            Get Started
          </button>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <div class="main">
      <!-- BREADCRUMB -->
      <div class="breadcrumb">
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M15 18l-6-6 6-6" />
        </svg>
        <a href="/project-phase.html">Tools</a>
        <span class="sep">›</span>
        <span class="current">Creation</span>
      </div>

      <!-- PAGE HEADER -->
      <div class="page-header">
        <h1 id="headerText">
          <div class="skel skel-line skel-desc-1" style="height: 50px"></div>
        </h1>
        <p id="descText">
          <span class="skel skel-line skel-name" style="width: 300px"></span>
        </p>
      </div>

      <!-- FILTER TABS -->
      <div class="filter-bars">
        <button data-filter="Script Writing" class="filter-tab">
          Script Writing
        </button>
        <button data-filter="Video Editing" class="filter-tab active">
          Video Editing
        </button>
        <button data-filter="Thumbnail Design" class="filter-tab">
          Thumbnail Design
        </button>
        <button data-filter="AI Voiceover" class="filter-tab">
          AI Voiceover
        </button>
        <button data-filter="SEO & Analytics" class="filter-tab">
          SEO & Analytics
        </button>
        <button data-filter="Social Media" class="filter-tab">
          Social Media
        </button>
        <button class="filter-clear clear-filter">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
          Clear Filter
        </button>
      </div>

      <!-- TOOLS GRID -->
      <div id="toolsGrid" class="tools-grid">
        <div class="tool-card">
          <div class="card-top">
            <div class="skel skel-icon"></div>
            <div class="skel skel-badge"></div>
          </div>
          <div class="skel skel-line skel-name"></div>
          <div style="margin-top: 10px">
            <div class="skel skel-line skel-desc-1"></div>
            <div class="skel skel-line skel-desc-2"></div>
            <div class="skel skel-line skel-desc-3"></div>
          </div>
          <div class="skel-tags">
            <div class="skel skel-tag"></div>
            <div class="skel skel-tag"></div>
          </div>
          <div class="skel skel-btn"></div>
        </div>

        <!-- Card 2 -->
        <div class="tool-card">
          <div class="card-top">
            <div class="skel skel-icon" style="animation-delay: 0.1s"></div>
            <div class="skel skel-badge" style="animation-delay: 0.2s"></div>
          </div>
          <div
            class="skel skel-line skel-name"
            style="animation-delay: 0.15s; width: 58%"
          ></div>
          <div style="margin-top: 10px">
            <div
              class="skel skel-line skel-desc-1"
              style="animation-delay: 0.2s"
            ></div>
            <div
              class="skel skel-line skel-desc-2"
              style="animation-delay: 0.25s; width: 75%"
            ></div>
            <div
              class="skel skel-line skel-desc-3"
              style="animation-delay: 0.3s; width: 60%"
            ></div>
          </div>
          <div class="skel-tags">
            <div
              class="skel skel-tag"
              style="animation-delay: 0.3s; width: 60px"
            ></div>
            <div class="skel skel-tag" style="animation-delay: 0.35s"></div>
          </div>
          <div class="skel skel-btn" style="animation-delay: 0.4s"></div>
        </div>

        <!-- Card 3 -->
        <div class="tool-card">
          <div class="card-top">
            <div class="skel skel-icon" style="animation-delay: 0.2s"></div>
            <div class="skel skel-badge" style="animation-delay: 0.3s"></div>
          </div>
          <div
            class="skel skel-line skel-name"
            style="animation-delay: 0.25s; width: 72%"
          ></div>
          <div style="margin-top: 10px">
            <div
              class="skel skel-line skel-desc-1"
              style="animation-delay: 0.3s"
            ></div>
            <div
              class="skel skel-line skel-desc-2"
              style="animation-delay: 0.35s; width: 85%"
            ></div>
            <div
              class="skel skel-line skel-desc-3"
              style="animation-delay: 0.4s; width: 50%"
            ></div>
          </div>
          <div class="skel-tags">
            <div
              class="skel skel-tag"
              style="animation-delay: 0.4s; width: 56px"
            ></div>
            <div
              class="skel skel-tag"
              style="animation-delay: 0.45s; width: 68px"
            ></div>
          </div>
          <div class="skel skel-btn" style="animation-delay: 0.5s"></div>
        </div>

        <!-- Card 4 -->
        <div class="tool-card">
          <div class="card-top">
            <div class="skel skel-icon" style="animation-delay: 0.15s"></div>
            <div class="skel skel-badge" style="animation-delay: 0.25s"></div>
          </div>
          <div
            class="skel skel-line skel-name"
            style="animation-delay: 0.2s; width: 62%"
          ></div>
          <div style="margin-top: 10px">
            <div
              class="skel skel-line skel-desc-1"
              style="animation-delay: 0.25s"
            ></div>
            <div
              class="skel skel-line skel-desc-2"
              style="animation-delay: 0.3s; width: 90%"
            ></div>
            <div
              class="skel skel-line skel-desc-3"
              style="animation-delay: 0.35s; width: 65%"
            ></div>
          </div>
          <div class="skel-tags">
            <div
              class="skel skel-tag"
              style="animation-delay: 0.35s; width: 72px"
            ></div>
            <div
              class="skel skel-tag"
              style="animation-delay: 0.4s; width: 44px"
            ></div>
          </div>
          <div class="skel skel-btn" style="animation-delay: 0.45s"></div>
        </div>

        <!-- Card 5 -->
        <div class="tool-card">
          <div class="card-top">
            <div class="skel skel-icon" style="animation-delay: 0.25s"></div>
            <div class="skel skel-badge" style="animation-delay: 0.35s"></div>
          </div>
          <div
            class="skel skel-line skel-name"
            style="animation-delay: 0.3s; width: 68%"
          ></div>
          <div style="margin-top: 10px">
            <div
              class="skel skel-line skel-desc-1"
              style="animation-delay: 0.35s"
            ></div>
            <div
              class="skel skel-line skel-desc-2"
              style="animation-delay: 0.4s; width: 78%"
            ></div>
            <div
              class="skel skel-line skel-desc-3"
              style="animation-delay: 0.45s; width: 52%"
            ></div>
          </div>
          <div class="skel-tags">
            <div
              class="skel skel-tag"
              style="animation-delay: 0.45s; width: 40px"
            ></div>
            <div
              class="skel skel-tag"
              style="animation-delay: 0.5s; width: 66px"
            ></div>
          </div>
          <div class="skel skel-btn" style="animation-delay: 0.55s"></div>
        </div>

        <!-- Card 6 -->
        <div class="tool-card">
          <div class="card-top">
            <div class="skel skel-icon" style="animation-delay: 0.3s"></div>
            <div class="skel skel-badge" style="animation-delay: 0.4s"></div>
          </div>
          <div
            class="skel skel-line skel-name"
            style="animation-delay: 0.35s; width: 55%"
          ></div>
          <div style="margin-top: 10px">
            <div
              class="skel skel-line skel-desc-1"
              style="animation-delay: 0.4s"
            ></div>
            <div
              class="skel skel-line skel-desc-2"
              style="animation-delay: 0.45s; width: 82%"
            ></div>
            <div
              class="skel skel-line skel-desc-3"
              style="animation-delay: 0.5s; width: 48%"
            ></div>
          </div>
          <div class="skel-tags">
            <div
              class="skel skel-tag"
              style="animation-delay: 0.5s; width: 48px"
            ></div>
            <div
              class="skel skel-tag"
              style="animation-delay: 0.55s; width: 54px"
            ></div>
          </div>
          <div class="skel skel-btn" style="animation-delay: 0.6s"></div>
        </div>
      </div>

      <!-- PAGINATION -->
      <div class="pagination-row">
        <div class="pagination-info">
          Showing 1–12 of 48 tools in Creation stage
        </div>
        <div class="pagination">
          <button class="page-btn">
            <svg viewBox="0 0 24 24">
              <path
                d="M15 18l-6-6 6-6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">
            <svg viewBox="0 0 24 24">
              <path
                d="M9 18l6-6-6-6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script src="./js/pages/landing.js"></script>
    <script type="module" src="./js/pages/ai-suggestion.js"></script>
  </body>
</html>
